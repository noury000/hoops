<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoops.tn | Thrifted Basketball Sneakers</title>
    <style>
        /* Dark Theme Background */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #333;
        }

        h1 { color: #ff4500; font-size: 3rem; margin: 0; }
        p { color: #bbb; }

        /* Sneaker Grid Layout */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px 0;
        }

        .card {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s;
            border: 1px solid #333;
        }

        .card:hover { transform: scale(1.05); border-color: #ff4500; }

        .card img {
            width: 100%;
            border-radius: 8px;
            height: 200px;
            object-fit: cover;
        }

        .price {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        footer { text-align: center; color: #555; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>HOOPS.TN</h1>
        <p>Premium Thrifted Basketball Sneakers in Tunisia</p>
    </header>

    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=500" alt="Nike Jordan">
            <h3>Air Jordan 1 Retro</h3>
            <p>Condition: 9/10</p>
            <div class="price">450 TND</div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1605348532760-6753d2c43329?q=80&w=500" alt="Nike LeBron">
            <h3>LeBron XXI "Conchiolin"</h3>
            <p>Condition: 8.5/10</p>
            <div class="price">640 TND</div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?q=80&w=500" alt="Nike PG">
            <h3>Nike PG 4 Trainer</h3>
            <p>Condition: Brand New</p>
            <div class="price">275 TND</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hoops.tn - Built by Ahmed</p>
    </footer>
<script async type='module' src='https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js'></script>

</body>
</html>
